# Amateur Radio Propagation - Bubble Card Dashboard
#
# Requires:
#   - custom:bubble-card  (HACS -> Frontend)
#
# Uses MUF station code "IF843" with lowercased entity IDs.
# Replace "IF843" / "if843" with your station code throughout.

title: Amateur Radio Propagation - Bubble Card
views:
  - title: Overview
    path: overview
    icon: mdi:radio-tower
    cards:
      - type: custom:bubble-card
        card_type: separator
        name: Space Weather Alerts
        icon: mdi:alert-outline

      - type: markdown
        content: |
          G/S/R scales summarize geomagnetic storms, radiation storms, and daylight HF blackout risk. NOAA Alerts exposes the latest alert text in More Info.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_alert_count
            name: NOAA Alerts
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_geomag_storm
            name: G Scale
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_radiation_storm
            name: S Scale
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_radio_blackout
            name: R Scale

      - type: custom:bubble-card
        card_type: separator
        name: Solar Activity
        icon: mdi:weather-sunny

      - type: markdown
        content: |
          SFI and sunspots show solar support for higher HF bands. K/Kp, Dst, Bz, and solar wind describe geomagnetic disturbance risk.

      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flux_index
            name: SFI
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_sunspots
            name: Sunspots
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_active_regions
            name: Active Regions
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_a_index
            name: A Index
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_k_index
            name: K Index
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_kp_estimated
            name: Kp
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_kp_forecast
            name: Kp Forecast
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_dst
            name: Dst
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_bz_noaa
            name: Bz
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_wind_speed_noaa
            name: Solar Wind
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_aurora_activity
            name: Aurora
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_aurora_latitude
            name: Aur Latitude

      - type: custom:bubble-card
        card_type: separator
        name: X-Ray and Forecasts
        icon: mdi:radioactive

      - type: markdown
        content: |
          X-ray class and NOAA flare probabilities help estimate daylight HF blackout risk. M/X probabilities are forecast guidance, not guarantees.

      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_xray
            name: X-Ray
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_xray_peak_class
            name: Peak
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_xray_scale
            name: X-Ray Scale
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flare_prob_m1
            name: M Prob 1d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flare_prob_x1
            name: X Prob 1d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flare_prob_m3
            name: M Prob 3d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flare_prob_x3
            name: X Prob 3d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_pca
            name: PCA

      - type: custom:bubble-card
        card_type: separator
        name: NOAA Outlook
        icon: mdi:chart-bell-curve

      - type: markdown
        content: |
          Predicted SFI and A-index show NOAA's short-term outlook. Use them with Kp forecast and Dst to judge whether conditions are improving or degrading.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_flux_predicted
            name: Predicted SFI
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_a_index_predicted
            name: A Index 1d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_a_index_predicted_2d
            name: A Index 2d
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_a_index_predicted_3d
            name: A Index 3d

      - type: custom:bubble-card
        card_type: separator
        name: HF Conditions
        icon: mdi:antenna

      - type: markdown
        content: |
          Band scores are broad operating guidance from hamqsl.com. They are useful for quick go/no-go decisions, but they are not path-specific predictions.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_80_40_day
            name: 80m-40m Day
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_30_20_day
            name: 30m-20m Day
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_17_15_day
            name: 17m-15m Day
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_12_10_day
            name: 12m-10m Day
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_80_40_night
            name: 80m-40m Night
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_30_20_night
            name: 30m-20m Night
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_17_15_night
            name: 17m-15m Night
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_12_10_night
            name: 12m-10m Night

      - type: custom:bubble-card
        card_type: separator
        name: HF Environment and VHF
        icon: mdi:sine-wave

      - type: markdown
        content: |
          foF2 and geomagnetic field describe HF stability. Aurora and E-skip entities are hints for VHF and 6m openings.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_geomag_field
            name: Geomag Field
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_sig_noise_lvl
            name: Noise Level
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_fof2
            name: foF2 Global
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_vhf_aurora
            name: VHF Aurora
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_vhf_eskip_na
            name: 2m E-Skip NA
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_vhf_eskip_eu
            name: 2m E-Skip EU
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_vhf_eskip_eu_6m
            name: 6m E-Skip EU
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_vhf_eskip_eu_4m
            name: 4m E-Skip EU

      - type: custom:bubble-card
        card_type: separator
        name: Ionosonde - IF843
        icon: mdi:access-point

      - type: markdown
        content: |
          MUF, foF2, foEs, and M(3000)F2 are station-local sounding data. They are useful cues, not a complete end-to-end path model.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_muf_if843
            name: MUF
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_fof2_if843
            name: foF2
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_foe_if843
            name: foE
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_foes_if843
            name: foEs
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_hmf2_if843
            name: hmF2
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_md_if843
            name: M(3000)F2
          - type: tile
            entity: sensor.amateur_radio_propagation_solar_hf_cs_if843
            name: Confidence

      - type: custom:bubble-card
        card_type: separator
        name: Source Freshness
        icon: mdi:database-clock-outline

      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.amateur_radio_propagation_solar_xray
            name: NOAA source
            secondary_info: last-updated
          - entity: sensor.amateur_radio_propagation_solar_flux_index
            name: hamqsl source
            secondary_info: last-updated
          - entity: sensor.amateur_radio_propagation_solar_hf_muf_if843
            name: kc2g source
            secondary_info: last-updated
