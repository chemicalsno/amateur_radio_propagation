[mypy]
python_version = 3.12
strict = true
ignore_missing_imports = true

[mypy-tests.*]
# Pytest fixtures are injected by name; missing annotations are expected.
disallow_untyped_defs = false
# Tests use # type: ignore to suppress Pyright-specific errors; mypy should not warn about them.
warn_unused_ignores = false

[mypy-custom_components.amateur_radio_propagation.sensor]
# Some # type: ignore comments exist solely to suppress Pyright errors (e.g. HA cached_property
# overrides, runtime_data attr); mypy sees these as unused because HA base classes are untyped.
warn_unused_ignores = false

[mypy-custom_components.amateur_radio_propagation.diagnostics]
# runtime_data # type: ignore is Pyright-specific; HA is untyped so mypy sees no error.
warn_unused_ignores = false

[mypy-custom_components.amateur_radio_propagation.types]
# type: ignore[type-arg] on ConfigEntry generic is Pyright-specific; mypy ignores it.
warn_unused_ignores = false

[mypy-custom_components.amateur_radio_propagation.config_flow]
# type: ignore[call-arg] on voluptuous Required(default=...) is Pyright-specific.
warn_unused_ignores = false
