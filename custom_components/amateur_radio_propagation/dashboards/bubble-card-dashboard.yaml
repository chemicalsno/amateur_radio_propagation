# Amateur Radio Propagation — Bubble Card Dashboard
#
# Requires:
#   - custom:bubble-card  (HACS → Frontend)
#
# Works on desktop, mobile browser, iOS and Android companion apps.
# No per-device setup required.
#
# Tap any section's ⓘ button to open a description popup for that group.
# Close popups by swiping down, pressing Escape, or tapping outside.
#
# Optional: add this to configuration.yaml to prevent popup content flashing on load:
#   frontend:
#     extra_module_url:
#       - /hacsfiles/Bubble-Card/bubble-pop-up-fix.js
#
# Ionosonde section:
#   Replace "IF843" / "if843" with your station code throughout.
#   Your station code is shown in Settings → Devices & Services → Amateur Radio Propagation.

