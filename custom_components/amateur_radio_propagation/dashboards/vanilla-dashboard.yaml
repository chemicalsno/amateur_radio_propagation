          - entity: sensor.amateur_radio_propagation_solar_hf_foes_if843
            name: foEs
          - entity: sensor.amateur_radio_propagation_solar_hf_hmf2_if843
            name: hmF2
          - entity: sensor.amateur_radio_propagation_solar_hf_tec_if843
            name: TEC
          - entity: sensor.amateur_radio_propagation_solar_hf_md_if843
            name: M(3000)F2
          - entity: sensor.amateur_radio_propagation_solar_hf_cs_if843
            name: Confidence

      - type: entities
        title: Optional Diagnostics
        show_header_toggle: false
        entities:
          - entity: sensor.amateur_radio_propagation_solar_proton_flux
            name: Proton Flux
          - entity: sensor.amateur_radio_propagation_solar_electron_flux
            name: Electron Flux
          - entity: sensor.amateur_radio_propagation_solar_helium_line
            name: Helium Line
          - entity: sensor.amateur_radio_propagation_solar_k_index_nighttime
            name: K Index Nighttime
          - entity: sensor.amateur_radio_propagation_solar_xray_begin_class
            name: X-Ray Begin Class
          - entity: sensor.amateur_radio_propagation_solar_xray_end_class
