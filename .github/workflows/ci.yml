name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    uses: ./.github/workflows/python-checks.yml
    permissions:
      contents: read
