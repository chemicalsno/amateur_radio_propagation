name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 2.1.0"
        required: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  require-main:
    name: Require main branch
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Release workflow must be run from main. Current ref: $GITHUB_REF"
          exit 1

  python-checks:
    name: Python checks
    needs: require-main
    uses: ./.github/workflows/python-checks.yml
    permissions:
      contents: read

  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    needs: require-main
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release metadata
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"Version must use MAJOR.MINOR.PATCH: {version}")

          manifest = json.loads(
              Path("custom_components/amateur_radio_propagation/manifest.json").read_text()
          )
          if manifest.get("version") != version:
              raise SystemExit(
                  "manifest.json version "
                  f"{manifest.get('version')!r} does not match {version!r}"
              )

          changelog = Path("CHANGELOG.md").read_text()
          if f"## [{version}]" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing section ## [{version}]")
          PY

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - python-checks
      - validate-release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text()
          match = re.search(
              rf"^## \[{re.escape(version)}\].*?\n(?P<body>.*?)(?=^## \[|\Z)",
              changelog,
              flags=re.MULTILINE | re.DOTALL,
          )
          if not match:
              raise SystemExit(f"Could not find changelog section for {version}")

          body = match.group("body").strip()
          if not body:
              raise SystemExit(f"Changelog section for {version} is empty")

          Path("release-notes.md").write_text(body + "\n")
          PY

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --repo "$REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Amateur Radio Propagation $VERSION" \
            --notes-file release-notes.md
